---
name: nextjs-web
description: Next.js web application
kind: app
skeletonPath: ./skeleton
config:
  replicas: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 9
    targetCPUUtilizationPercentage: 80
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 30
      scaleDown:
        stabilizationWindowSeconds: 300
  resources:
    requests:
      cpu: 50m
      memory: 1024Mi
    limits:
      cpu: 1000m
      memory: 1024Mi
