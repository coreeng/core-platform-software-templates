---
name: java-web
description: Java web application
kind: app
skeletonPath: ./skeleton
config:
  replicas: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 80
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 30
      scaleDown:
        stabilizationWindowSeconds: 300
  resources:
    limits:
      cpu: 1000m
      memory: 1024Mi
