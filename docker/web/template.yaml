---
name: docker-web
description: Docker web application
kind: app
skeletonPath: ./skeleton
config:
  replicas: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 9
    targetCPUUtilizationPercentage: 80
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 30
      scaleDown:
        stabilizationWindowSeconds: 300
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      cpu: 250m
      memory: 512Mi
